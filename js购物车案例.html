<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>购物清单 - 电商平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 标题栏 */
        .header {
            background: linear-gradient(135deg, #1e88e5 0%, #0d47a1 100%);
            color: white;
            padding: 20px 24px;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 2px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        /* 购物清单区域 */
        .cart-container {
            background: white;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* 表头 */
        .cart-header {
            display: flex;
            align-items: center;
            padding: 18px 24px;
            background-color: #f8fafc;
            border-bottom: 1px solid #eaeaea;
            font-weight: 600;
            color: #555;
        }

        .select-all {
            display: flex;
            align-items: center;
            margin-right: 40px;
            white-space: nowrap;
        }

        .select-all input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .header-item {
            flex: 1;
            text-align: center;
        }

        .header-item.product {
            flex: 3;
            text-align: left;
        }

        .header-item.operation {
            flex: 1.2;
        }

        /* 商品项目 */
        .cart-item {
            display: flex;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
        }

        .cart-item:hover {
            background-color: #f9fbfd;
        }

        .item-select {
            margin-right: 20px;
        }

        .item-select input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .item-product {
            flex: 3;
            display: flex;
            align-items: center;
        }

        .product-image {
            width: 100px;
            height: 100px;
            background-color: #f8f9fa;
            border-radius: 8px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            overflow: hidden;
        }

        .product-image img {
            max-width: 80%;
            max-height: 80%;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #222;
        }

        .product-details {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .product-details div {
            margin-bottom: 4px;
        }

        .product-brand {
            color: #1e88e5;
            font-weight: 500;
        }

        .item-quantity {
            flex: 1;
            text-align: center;
        }

        .quantity-control {
            display: inline-flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .quantity-btn {
            width: 32px;
            height: 32px;
            background-color: #f8f9fa;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #555;
            transition: background-color 0.2s;
        }

        .quantity-btn:hover {
            background-color: #e9ecef;
        }

        .quantity-input {
            width: 50px;
            height: 32px;
            border: none;
            text-align: center;
            font-size: 16px;
            color: #333;
            background-color: white;
        }

        .item-price,
        .item-total {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
        }

        .item-price {
            color: #e53935;
        }

        .item-total {
            color: #d32f2f;
            font-weight: 600;
        }

        .item-operation {
            flex: 1.2;
            text-align: center;
        }

        .delete-btn {
            background-color: transparent;
            border: 1px solid #ffcdd2;
            color: #e53935;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background-color: #ffebee;
            border-color: #e53935;
        }

        /* 底部栏 */
        .cart-footer {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8fafc;
            border-top: 1px solid #eaeaea;
        }

        .footer-left {
            display: flex;
            gap: 20px;
        }

        .delete-selected {
            background-color: transparent;
            border: 1px solid #ccc;
            color: #666;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .delete-selected:hover {
            background-color: #f0f0f0;
            color: #333;
        }

        .continue-shopping {
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            color: #333;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }

        .continue-shopping:hover {
            background-color: #e8e8e8;
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .total-info {
            text-align: right;
        }

        .total-count {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .total-price {
            font-size: 24px;
            font-weight: 700;
            color: #d32f2f;
        }

        .currency {
            font-size: 18px;
            font-weight: 600;
        }

        .checkout-btn {
            background: linear-gradient(to right, #ff9800, #f57c00);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
            transition: all 0.3s;
        }

        .checkout-btn:hover {
            background: linear-gradient(to right, #f57c00, #ef6c00);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 152, 0, 0.4);
        }

        /* 响应式设计 */
        @media (max-width: 992px) {
            .cart-header {
                display: none;
            }

            .cart-item {
                flex-wrap: wrap;
                position: relative;
                padding-bottom: 40px;
            }

            .item-select {
                position: absolute;
                top: 24px;
                left: 24px;
            }

            .item-product {
                flex: 1 0 100%;
                margin-bottom: 20px;
                padding-left: 40px;
            }

            .item-quantity,
            .item-price,
            .item-total {
                flex: 1;
                text-align: left;
                margin-bottom: 10px;
                padding-left: 20px;
            }

            .item-operation {
                position: absolute;
                bottom: 24px;
                right: 24px;
            }

            .footer-left {
                flex-direction: column;
                gap: 10px;
            }

            .cart-footer {
                flex-direction: column;
                gap: 20px;
                align-items: flex-start;
            }

            .footer-right {
                width: 100%;
                justify-content: space-between;
            }
        }

        .product-img {
            width: 100px;
            height: 100px;
            background-color: #e0e0e0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9e9e9e;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 标题栏 -->
        <div class="header">
            <h1>购物清单</h1>
        </div>

        <!-- 购物清单内容 -->
        <div class="cart-container">
            <!-- 表头 -->
            <div class="cart-header">
                <div class="select-all">
                    <input type="checkbox" id="select-all" />
                    <label for="select-all">全选</label>
                </div>
                <div class="header-item product">商品</div>
                <div class="header-item">数量</div>
                <div class="header-item">单价(元)</div>
                <div class="header-item">金额(元)</div>
                <div class="header-item operation">操作</div>
            </div>

            <!-- 商品列表 -->
            <div class="cart-items">
                <!-- 商品1 -->
                <div class="cart-item">
                    <div class="item-select">
                        <input type="checkbox" class="item-checkbox" checked />
                    </div>
                    <div class="item-product">
                        <div class="product-image">
                            <img src="./images/good1.jpg" alt="" />
                        </div>
                        <div class="product-info">
                            <div class="product-name">羽绒服</div>
                            <div class="product-details">
                                <div>
                                    <span class="product-brand">品牌：SKC</span>
                                    <span>产地：韩国</span>
                                </div>
                                <div>规格/纯度：99.7% 起定量：215千克</div>
                                <div>配送仓储：上海仓海仓储</div>
                            </div>
                        </div>
                    </div>
                    <div class="item-quantity">
                        <div class="quantity-control">
                            <button class="quantity-btn minus">-</button>
                            <input type="text" class="quantity-input" value="3" readonly />
                            <button class="quantity-btn plus">+</button>
                        </div>
                    </div>
                    <div class="item-price">￥800.00</div>
                    <div class="item-total">￥2400.00</div>
                    <div class="item-operation">
                        <button class="delete-btn">删除</button>
                    </div>
                </div>

                <!-- 商品2 -->
                <div class="cart-item">
                    <div class="item-select">
                        <input type="checkbox" class="item-checkbox" checked />
                    </div>
                    <div class="item-product">
                        <div class="product-image">
                            <img src="./images/good2.jpg" alt="" />
                        </div>
                        <div class="product-info">
                            <div class="product-name">毛衣</div>
                            <div class="product-details">
                                <div>
                                    <span class="product-brand">品牌：SKC</span>
                                    <span>产地：韩国</span>
                                </div>
                                <div>规格/纯度：99.7% 起定量：215千克</div>
                                <div>配送仓储：上海仓海仓储</div>
                            </div>
                        </div>
                    </div>
                    <div class="item-quantity">
                        <div class="quantity-control">
                            <button class="quantity-btn minus">-</button>
                            <input type="text" class="quantity-input" value="1" readonly />
                            <button class="quantity-btn plus">+</button>
                        </div>
                    </div>
                    <div class="item-price">￥800.00</div>
                    <div class="item-total">￥800.00</div>
                    <div class="item-operation">
                        <button class="delete-btn">删除</button>
                    </div>
                </div>

                <div class="cart-item">
                    <div class="item-select">
                        <input type="checkbox" class="item-checkbox" checked />
                    </div>
                    <div class="item-product">
                        <div class="product-image">
                            <img src="./images/good1.jpg" alt="" />
                        </div>
                        <div class="product-info">
                            <div class="product-name">羽绒服</div>
                            <div class="product-details">
                                <div>
                                    <span class="product-brand">品牌：SKC</span>
                                    <span>产地：韩国</span>
                                </div>
                                <div>规格/纯度：99.7% 起定量：215千克</div>
                                <div>配送仓储：上海仓海仓储</div>
                            </div>
                        </div>
                    </div>
                    <div class="item-quantity">
                        <div class="quantity-control">
                            <button class="quantity-btn minus">-</button>
                            <input type="text" class="quantity-input" value="3" readonly />
                            <button class="quantity-btn plus">+</button>
                        </div>
                    </div>
                    <div class="item-price">￥800.00</div>
                    <div class="item-total">￥2400.00</div>
                    <div class="item-operation">
                        <button class="delete-btn">删除</button>
                    </div>
                </div>

            </div>

            <!-- 底部栏 -->
            <div class="cart-footer">
                <div class="footer-left">
                    <button class="delete-selected">删除所选商品</button>
                    <a href="#" class="continue-shopping">继续购物</a>
                </div>
                <div class="footer-right">
                    <div class="total-info">
                        <div class="total-count">2件商品总计(不含运费)：</div>
                        <div class="total-price">
                            <span class="currency">￥</span>3200
                        </div>
                    </div>
                    <button class="checkout-btn">去结算</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const minusBtns = document.querySelectorAll('.quantity-btn.minus')
        const plusBtns = document.querySelectorAll('.quantity-btn.plus')
        const totalpriceEle = document.querySelector('.total-price')
        const checkboxAllEle = document.getElementById('select-all')
        const checkboxItemEles = document.querySelectorAll('.item-checkbox')
        const deleteSelectedBtn = document.querySelector('.delete-selected')
        const deleteBtns = document.querySelectorAll('.delete-btn')
        const totalCountEle = document.querySelector('.total-count')

        //计算总计金额
        function calcTotal() {
            let total = 0
            document.querySelectorAll('.cart-item').forEach(function (cartItem) {
                const checkbox = cartItem.querySelector('.item-checkbox');
                if (checkbox.checked) {
                    const priceEle = cartItem.querySelector('.item-price');
                    const price = parseFloat(priceEle.innerText.replace('￥', '')) || 0;
                    const countInput = cartItem.querySelector('.quantity-input');
                    const count = parseInt(countInput.value) || 1;
                    total += price * count;
                }
            })
            totalpriceEle.innerText = '￥' + total;
            return total;
        }

        // 商品件数
        function updateGoodsCount() {
            const cartItems = document.querySelectorAll('.cart-item');
            const count = cartItems.length;
            if (totalCountEle) {
                totalCountEle.innerText = `${count}件商品总计(不含运费)：`;
            }
            return count;
        }

        // 减号按钮
        minusBtns.forEach(function (item) {
            item.addEventListener('click', function () {
                const input = this.nextElementSibling
                let count = parseInt(input.value)
                if (count > 1) {
                    count = count - 1
                    input.value = count
                    const price = 800
                    const itemTotalEle = this.closest('.cart-item').querySelector('.item-total');
                    itemTotalEle.innerText = '￥' + (count * price)
                    calcTotal();
                }
            })
        })

        // 加号按钮
        plusBtns.forEach(function (item) {
            item.addEventListener('click', function () {
                const input = this.previousElementSibling
                let count = parseInt(input.value)
                count = count + 1
                input.value = count
                const price = 800
                const itemTotalEle = this.closest('.cart-item').querySelector('.item-total');
                itemTotalEle.innerText = '￥' + (count * price)
                calcTotal();
            })
        })

        // 全选框
        checkboxAllEle.addEventListener('click', function () {
            let checked = this.checked
            checkboxItemEles.forEach(function (checkboxItem) {
                checkboxItem.checked = checked
            })
            calcTotal();
        })

        // 页面初始化商品框的状态
        let allItemCheckedStatus = []
        checkboxItemEles.forEach(function (item) {
            allItemCheckedStatus.push(item.checked)
        })

        // 商品框
        checkboxItemEles.forEach(function (checkboxItem, index) {
            checkboxItem.addEventListener('click', function () {
                allItemCheckedStatus[index] = this.checked
                let isAllchecked = true
                for (let i = 0; i < allItemCheckedStatus.length; i++) {
                    if (!allItemCheckedStatus[i]) {
                        isAllchecked = false
                        break
                    }
                }
                checkboxAllEle.checked = isAllchecked
                calcTotal();
            })
        })

        // 删除勾选商品
        deleteSelectedBtn.addEventListener('click', function () {
            const cartItems = Array.from(document.querySelectorAll('.cart-item'))
            cartItems.forEach(function (cartItem) {
                const checkbox = cartItem.querySelector('.item-checkbox')
                if (checkbox.checked) {
                    alert('真的要删除吗')
                    cartItem.remove();
                }
            })
            calcTotal();
            updateGoodsCount();
            checkboxAllEle.checked = false;
        })

        // 商品删除
        deleteBtns.forEach(function (deleteBtn) {
            deleteBtn.addEventListener('click', function () {
                const cartItem = this.closest('.cart-item')
                if (!cartItem) {
                    return
                }
                alert('真的要删除吗')
                cartItem.remove()
                calcTotal();
                updateGoodsCount();
                checkboxAllEle.checked = false;
            })
        })
        calcTotal();
        updateGoodsCount();
    </script>
</body>

</html>
